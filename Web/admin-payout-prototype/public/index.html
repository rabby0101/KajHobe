<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KajHobe · Payout Admin (prototype)</title>
  <style>
    :root { --bg:#f4f5f7; --card:#fff; --ink:#1c2024; --muted:#6b7280; --line:#e5e7eb;
            --brand:#e2136e; --ok:#0a7d3c; --okbg:#e7f6ec; }
    * { box-sizing: border-box; }
    body { margin:0; font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
           background:var(--bg); color:var(--ink); }
    header { background:var(--brand); color:#fff; padding:18px 24px; }
    header h1 { margin:0; font-size:18px; }
    header p { margin:4px 0 0; font-size:12px; opacity:.85; }
    main { max-width:920px; margin:24px auto; padding:0 16px; }
    .bar { display:flex; align-items:center; gap:12px; margin-bottom:16px; }
    .bar button { background:#fff; border:1px solid var(--line); border-radius:8px;
                  padding:8px 14px; cursor:pointer; font-size:14px; }
    .count { color:var(--muted); font-size:13px; }
    .card { background:var(--card); border:1px solid var(--line); border-radius:14px;
            padding:18px; margin-bottom:14px; box-shadow:0 1px 2px rgba(0,0,0,.04); }
    .row { display:flex; justify-content:space-between; gap:16px; flex-wrap:wrap; }
    .title { font-weight:600; font-size:16px; }
    .amount { font-weight:700; font-size:18px; color:var(--brand); white-space:nowrap; }
    .grid { display:grid; grid-template-columns:140px 1fr; gap:6px 14px; margin:14px 0;
            font-size:14px; }
    .grid .k { color:var(--muted); }
    .bkash { font-variant-numeric:tabular-nums; font-weight:600; letter-spacing:.5px; }
    .warn { color:#9a3412; font-size:13px; }
    .mismatch { color:#b91c1c; font-weight:600; }
    .actions { display:flex; gap:10px; align-items:center; margin-top:8px; flex-wrap:wrap; }
    .actions input { flex:1; min-width:180px; padding:9px 11px; border:1px solid var(--line);
                     border-radius:8px; font-size:14px; }
    .approve { background:var(--ok); color:#fff; border:none; border-radius:8px;
               padding:10px 18px; font-size:14px; font-weight:600; cursor:pointer; }
    .approve:disabled { opacity:.5; cursor:not-allowed; }
    .empty,.err { text-align:center; color:var(--muted); padding:48px 0; }
    .err { color:#b91c1c; }
    .pill { display:inline-block; background:var(--okbg); color:var(--ok); font-size:12px;
            padding:2px 8px; border-radius:999px; }
  </style>
</head>
<body>
  <header>
    <h1>KajHobe · Provider Payouts</h1>
    <p>Prototype admin panel — released escrows awaiting manual bKash payout. Localhost only.</p>
  </header>
  <main>
    <div class="bar">
      <button id="refresh">↻ Refresh</button>
      <span class="count" id="count"></span>
    </div>
    <div id="list"></div>
  </main>

  <script>
    const fmtAmount = (n, cur) => `${cur === 'BDT' ? '৳' : ''}${Number(n).toLocaleString('en-US')}`;
    const fmtDate = (s) => s ? new Date(s).toLocaleString() : '—';
    const esc = (s) => String(s ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

    async function load() {
      const list = document.getElementById('list');
      const count = document.getElementById('count');
      list.innerHTML = '<div class="empty">Loading…</div>';
      try {
        const res = await fetch('/api/payouts');
        const body = await res.json();
        if (!res.ok) throw new Error(body.error || 'Request failed');
        const payouts = body.payouts || [];
        count.textContent = `${payouts.length} awaiting payout`;
        if (payouts.length === 0) {
          list.innerHTML = '<div class="empty">🎉 No payouts pending. All released escrows are settled.</div>';
          return;
        }
        list.innerHTML = payouts.map(renderCard).join('');
      } catch (e) {
        list.innerHTML = `<div class="err">Failed to load: ${esc(e.message)}</div>`;
        count.textContent = '';
      }
    }

    function renderCard(p) {
      const bkash = p.provider_bkash_current || p.provider_bkash_snapshot;
      const noNumber = !bkash;
      const mismatch = p.provider_bkash_current && p.provider_bkash_snapshot
        && p.provider_bkash_current !== p.provider_bkash_snapshot;
      return `
      <div class="card" data-escrow="${p.escrow_id}">
        <div class="row">
          <div class="title">${esc(p.job_title)}${p.job_category ? ` · ${esc(p.job_category)}` : ''}</div>
          <div class="amount">${fmtAmount(p.provider_amount ?? p.amount, p.currency)}</div>
        </div>
        <div class="grid">
          <div class="k">Pay to (provider)</div><div>${esc(p.provider_name)}</div>
          <div class="k">bKash number</div>
          <div class="bkash">${noNumber ? '<span class="mismatch">⚠ none set — provider must add one</span>' : esc(bkash)}
            ${mismatch ? `<div class="warn">⚠ current ${esc(p.provider_bkash_current)} differs from snapshot ${esc(p.provider_bkash_snapshot)} — verify which to pay</div>` : ''}
          </div>
          <div class="k">From (client)</div><div>${esc(p.client_name)}</div>
          <div class="k">Released</div><div>${fmtDate(p.released_at)}</div>
        </div>
        <div class="warn">Verify the number in the bKash merchant app and send money manually, then paste the trx ID and approve.</div>
        <div class="actions">
          <input type="text" placeholder="bKash transaction ID (e.g. TRX123ABC)" />
          <button class="approve" ${noNumber ? 'disabled title="Provider has no payout number"' : ''}>Approve · Mark Paid Out</button>
        </div>
      </div>`;
    }

    document.getElementById('refresh').addEventListener('click', load);

    document.getElementById('list').addEventListener('click', async (e) => {
      const btn = e.target.closest('.approve');
      if (!btn) return;
      const card = btn.closest('.card');
      const escrowId = card.dataset.escrow;
      const trx = card.querySelector('input').value.trim();
      if (!confirm('Confirm you have already sent the money via bKash. Mark this payout as paid out?')) return;
      btn.disabled = true; btn.textContent = 'Approving…';
      try {
        const res = await fetch(`/api/payouts/${escrowId}/approve`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ trx_id: trx || null, notes: 'Manual bKash payout via admin panel' }),
        });
        const body = await res.json();
        if (!res.ok) throw new Error(body.error || 'Approve failed');
        card.querySelector('.actions').innerHTML = '<span class="pill">✓ Paid out</span>';
        setTimeout(load, 800);
      } catch (err) {
        alert('Failed: ' + err.message);
        btn.disabled = false; btn.textContent = 'Approve · Mark Paid Out';
      }
    });

    load();
  </script>
</body>
</html>
